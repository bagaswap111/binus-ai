services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: binus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-binus_prod}
      POSTGRES_DB: binus_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--bundle", "/policies"]
    volumes:
      - ./opa/policies:/policies
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-binus}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-binus_prod}
    restart: unless-stopped

  ai-gateway:
    build:
      context: ../apps/ai-gateway
    environment:
      NEXTJS_URL: http://nextjs:3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - opa
    restart: unless-stopped

  nextjs:
    build:
      context: ../apps/web
    environment:
      DATABASE_URL: postgresql://binus:${DB_PASSWORD:-binus_prod}@postgres:5432/binus_ai
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: http://localhost:3000
      GATEWAY_URL: http://ai-gateway:8000
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs
      - ai-gateway
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
