services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: binus
      POSTGRES_PASSWORD: binus_dev
      POSTGRES_DB: binus_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: ["run", "--server", "--bundle", "/policies", "--log-level=debug"]
    volumes:
      - ./opa/policies:/policies

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: binus
      MINIO_ROOT_PASSWORD: binus_dev
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
